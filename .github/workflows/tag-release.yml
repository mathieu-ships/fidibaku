name: Tag Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump when version is empty"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: "Explicit version, without v. Use 0.1.0 for the first publish."
        required: false
        type: string

permissions:
  actions: write
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate branch
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$BRANCH" != "main" ]; then
            echo "::error::This workflow can only run from main. Got: $BRANCH"
            exit 1
          fi

      - name: Compute release version
        id: version
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="${INPUT_VERSION#v}"
          else
            CURRENT="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 | sed 's/^v//')"
            if [ -z "$CURRENT" ]; then
              CURRENT="$(node -p "require('./package.json').version")"
            fi
            IFS=. read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case "${{ github.event.inputs.bump }}" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi

          if ! node -e "const v=process.argv[1]; if (!/^[0-9]+\\.[0-9]+\\.[0-9]+(?:[-+][0-9A-Za-z.-]+)?$/.test(v)) process.exit(1)" "$VERSION"; then
            echo "::error::Invalid semver version: $VERSION"
            exit 1
          fi

          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify
        run: |
          npm install --package-lock=false
          npm run check
          npm run smoke
          npm pack --dry-run

      - name: Tag verified commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Dispatch publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run publish.yml --ref main -f tag="${{ steps.version.outputs.tag }}"

      - name: Summary
        run: echo "Tagged ${{ steps.version.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
